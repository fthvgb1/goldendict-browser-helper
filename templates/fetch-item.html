<div class="super-fetch-item">
    <button class="fetch-fold" title="{{fold-or-unfold|lang}}">➖</button>
    <div class="fetch-dd">
        <input class="super-fetch-name" name="super-fetch-name" placeholder="{{super-fetch-name|lang}}" required
               title="{{super-fetch-name|lang}}" type="text"
               value="{{super-fetch-name}}">
        <select class="operation" name="operation">
            {{operations|buildOption(operation)}}
        </select>
        <button class="add-super-fetch-item" data-op="add" data-target=".super-fetch-item" data-tpl-fn="fetch"
                title="{{add|lang}}">+
        </button>
        <button class="remove-super-fetch-item" data-op="remove" data-target=".super-fetch-item">-</button>
    </div>
    <div class="fetch-dd">
        <input class="parent-super-name" name="parent-super-name" placeholder="{{parent-super-name|lang}}"
               title="{{parent-super-name|lang}}" value="{{parent-super-name}}">
        <input class="value-selector" data-multiple-required name="value-selector"
               placeholder="{{value-selector|lang}}" title="{{value-selector|lang}}"
               value="{{value-selector|htmlSpecial}}">
        <input name="cached" placeholder="{{cached|lang}}" title="{{cached|lang}}" type="checkbox" {{cached|checked}}>
        <input class="multiple_child" name="multiple_child" placeholder="{{multiple_child|lang}}"
               title="{{multiple_child|lang}}" type="checkbox" {{multiple_child|checked}}>
        <input class="concatenation" name="concatenation" title="{{concatenation|lang}}" type="checkbox"
               {{concatenation|checked}}>
        <input class="separator" name="separator" placeholder="{{separator|lang}}" title="{{separator|lang}}"
               type="text" value="{{separator}}">
        <input class="fetch-repeat" name="fetch-repeat" title="{{fetch-repeat|lang}}" type="checkbox"
               {{fetch-repeat|checked}}>
    </div>

    <div class="fetch-dd">
        <select class="fetch-data-type" name="fetch-data-type" title="{{fetch-data-type|lang}}">
            {{htmlType|buildOption(fetch-data-type)}}
        </select>
        <input class="default-value" name="default-value" placeholder="{{default-value|lang}}"
               data-multiple-required title="{{default-value|lang}}"
               type="text" value="{{default-value|htmlSpecial}}">
        <input class="fetch-format" data-multiple-required name="fetch-format" placeholder="{{fetch-format|lang}}"
               title="{{fetch-format|lang}}" value="{{fetch-format|htmlSpecial}}">
        <input class="handleValue beautiful_switch" name="handleValue" title="{{handleValue|lang}}" type="checkbox"
               {{handleValue|checked}}>
    </div>

    <div class="fetch-dd">
        <ul class="fetch-replacement-items" data-batch>
            <template>replacement-item-html</template>
        </ul>
    </div>
</div>
