<div class="super-fetch-item">
    <div class="fetch-dd">
        <input class="super-fetch-name" name="super-fetch-name" placeholder="{{super-fetch-name|lang}}"
               title="{{super-fetch-name|lang}}" type="text"
               value="{{super-fetch-name}}">
        <button class="add-super-fetch-item" data-op="add" data-target=".super-fetch-item">+</button>
        <button class="remove-super-fetch-item" data-op="remove" data-target=".super-fetch-item">-</button>
    </div>
    <div class="fetch-dd">
        <input class="parent-super-name" name="parent-super-name" placeholder="{{parent-super-name|lang}}"
               title="{{parent-super-name|lang}}" value="{{parent-super-name}}">
        <input class="fetch-parent-selector" name="fetch-parent-selector"
               placeholder="{{fetch-parent-selector|lang}}" title="{{fetch-parent-selector|lang}}"
               value="{{fetch-parent-selector}}">
    </div>

    <div class="fetch-dd">
        <input class="fetch-variable" name="fetch-variable" placeholder="{{fetch-variable|lang}}"
               title="{{fetch-variable|lang}}"
               type="text" value="{{fetch-variable}}">
        <input class="fetch-format" name="fetch-format" placeholder="{{fetch-format|lang}}"
               title="{{fetch-format|lang}}" value="{{fetch-format}}">
    </div>

    <div class="fetch-dd">
        <ul class="fetch-replacement-items" data-batch>
            {{replacement-item-html}}
        </ul>
    </div>
</div>
