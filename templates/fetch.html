<div class="fetch-box fetch-action-container">
    <div class="fetch-dd">
        <input class="fetch-field" name="fetch-field" placeholder="{{fetch-field|lang}}" required
               title="{{fetch-field|lang}}" value="{{fetch-field}}">
        <input class="fetch-to-field" name="fetch-to-field" placeholder="{{fetch-to-field|lang}}" required
               title="{{fetch-to-field|lang}}" value="{{fetch-to-field}}">
    </div>

    <div class="fetch-dd">
        <input class="fetch-format" name="fetch-format" placeholder="{{fetch-format|lang}}"
               title="{{fetch-format|lang}}"
               type="text" value="{{fetch-format|htmlSpecial}}">
        <input class="fetch-num" min="0" name="fetch-num" placeholder="{{fetch-num|lang}}" step="1"
               title="{{fetch-num|lang}}"
               type="number" value="{{fetch-num}}">
        <select class="fetch-data-handle" name="fetch-data-handle" title="{{fetch-data-handle|lang}}">
            {{handleOp|buildOption(fetch-data-handle)}}
        </select>
        <input class="fetch-repeat" name="fetch-repeat" placeholder="{{fetch-repeat|lang}}"
               title="{{fetch-repeat|lang}}" type="checkbox" {{fetch-repeat|checked}}>
    </div>

    <div class="fetch-dd">
        <div class="selector-chain" data-batch>
            <template>fetch-chain-html</template>
        </div>
    </div>


    <div class="super-fetch-items" data-batch>
        <template>super-fetch-item-html</template>
    </div>
</div>
