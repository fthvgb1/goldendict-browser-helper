<li class="fetch-replacement-item">
    <select class="replace_target_type" name="replace_target_type" title="{{replace_target_type|lang}}">
        {{htmlType|buildOption(replace_target_type)}}
    </select>
    <input class="fetch-replacement-target" name="searchValue" placeholder="{{searchValue|lang}}" required
           title="{{searchValue|lang}}" type="text" value="{{searchValue|htmlSpecial}}">
    <input class="fetch-replacement-value" name="replaceValue" placeholder="{{replaceValue|lang}}"
           title="{{replaceValue|lang}}"
           type="text" value="{{replaceValue|htmlSpecial}}">
    <input class="replace_regex_pattern" name="replace_regex_pattern" placeholder="{{replace_regex_pattern|lang}}"
           title="{{replace_regex_pattern|lang}}"
           type="text" value="{{replace_regex_pattern}}">
    <button class="replacement-add" data-op="add" title="{{add|lang}}">+︎</button>
    <button class="replacement-remove" data-op="remove">-</button>
</li>
