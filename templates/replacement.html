<div class="fetch-dd">
    <input class="fetch-field" name="fetch-field" placeholder="{{title.fetch-field}}"
           title="{{title.fetch-field}}" value="{{fetch-field}}">
</div>
<div class="fetch-dd">
    <input class="fetch-selector" name="fetch-selector" placeholder="{{title.fetch-selector}}"
           title="{{title.fetch-selector}}" value="{{fetch-selector}}">
</div>

<div class="fetch-dd">
    <input class="fetch-value-replacement" name="fetch-value-replacement"
           placeholder="{{title.fetch-value-replacement}}" title="{{title.fetch-value-replacement}}"
           value="{{fetch-value-replacement}}">
    <input class="fetch-value-trim" name="fetch-value-trim" placeholder="{{title.fetch-value-trim}}"
           title="{{title.fetch-value-trim}}"
           type="checkbox" {{fetch-value-trim-checked}}>
    <input class="fetch-value-replacement-ignore-case" name="fetch-value-replacement-ignore-case"
           placeholder="{{title.fetch-value-replacement-ignore-case}}"
           title="{{title.fetch-value-replacement-ignore-case}}" type="checkbox"
           {{fetch-value-replacement-ignore-case-checked}}>
    <select class="fetch-data-type" name="fetch-data-type"
            title="{{title.fetch-data-type}}">
        {{fetch-data-type-options}}
    </select>
</div>
<div class="fetch-dd">
    <input class="fetch-html-replacement" name="fetch-html-replacement"
           placeholder="{{title.fetch-html-replacement}}" title="{{title.fetch-html-replacement}}"
           value="{{fetch-html-replacement}}">
    <input class="fetch-html-replacement-ignore-case" name="fetch-html-replacement-ignore-case"
           placeholder="{{title.fetch-html-replacement-ignore-case}}"
           title="{{title.fetch-html-replacement-ignore-case}}" type="checkbox"
           {{fetch-html-replacement-ignore-case-checked}}>
</div>
